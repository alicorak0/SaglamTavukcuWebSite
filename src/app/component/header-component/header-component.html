      <span></span>
    </div>

    <!-- MENU LINKS -->
    <div class="menu-links" [class.open]="isMenuOpen">
      <ul>
        <li [routerLink]="['/']" (click)="closeMenu()">Anasayfa</li>
        <li [routerLink]="['/menu']" (click)="closeMenu()">Menü</li>
        <li [routerLink]="['/hakkımızda']" (click)="closeMenu()">Hakkımızda</li>
